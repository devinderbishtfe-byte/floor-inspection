<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Inspection">
<meta name="theme-color" content="#128C7E">
<title>Floor Inspection</title>
<style>
/* ════════════════ ROOT ════════════════ */
:root{
  --wa:      #25D366;
  --wd:      #128C7E;
  --wl:      #DCF8C6;
  --bg:      #ECE5DD;
  --card:    #fff;
  --txt:     #111b21;
  --mute:    #667781;
  --bdr:     #e9edef;
  --red:     #e74c3c;
  --blue:    #1a73e8;
  --font:    -apple-system,'Segoe UI',Helvetica,Arial,sans-serif;
  --r:       20px;
  --tap:     60px;
}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%;font-family:var(--font);background:var(--bg);color:var(--txt);font-size:16px;overscroll-behavior:none;-webkit-font-smoothing:antialiased}
::-webkit-scrollbar{width:3px}
::-webkit-scrollbar-thumb{background:rgba(0,0,0,.12);border-radius:3px}

/* ════════════════ HEADER ════════════════ */
#hdr{
  background:var(--wd);
  padding:12px 16px 10px;
  display:flex;align-items:center;gap:12px;
  position:sticky;top:0;z-index:200;
  box-shadow:0 2px 14px rgba(0,0,0,.25);
}
#hdr-av{
  width:48px;height:48px;background:var(--wa);
  border-radius:50%;display:flex;align-items:center;
  justify-content:center;font-size:26px;flex-shrink:0;
  box-shadow:0 2px 8px rgba(0,0,0,.2);
}
#hdr-info{flex:1;min-width:0}
#hdr-info h1{font-size:17px;font-weight:800;color:#fff;letter-spacing:-.2px}
#hdr-info p{font-size:12px;color:rgba(255,255,255,.7);margin-top:1px}
#hdr-step{
  background:var(--wa);color:#fff;
  font-size:12px;font-weight:800;
  padding:5px 13px;border-radius:20px;
  white-space:nowrap;flex-shrink:0;
}

/* ════════════════ PROGRESS ════════════════ */
#prog-wrap{background:var(--wd);padding:0 16px 11px}
#prog-track{height:4px;background:rgba(255,255,255,.2);border-radius:2px;overflow:hidden}
#prog-fill{height:100%;background:var(--wa);border-radius:2px;transition:width .5s ease;width:0%}
#prog-txt{font-size:11px;color:rgba(255,255,255,.6);margin-top:4px;text-align:right}

/* ════════════════ CHAT ════════════════ */
#chat{
  padding:14px 13px 110px;
  display:flex;flex-direction:column;gap:10px;
  min-height:calc(100dvh - 120px);
}

/* date divider */
.ddiv{text-align:center;margin:4px 0}
.ddiv span{
  background:rgba(255,255,255,.82);color:var(--mute);
  font-size:12px;font-weight:600;
  padding:5px 16px;border-radius:20px;
  box-shadow:0 1px 3px rgba(0,0,0,.08);
}

/* ── BUBBLE ─────────────────────────── */
.bw{display:flex;flex-direction:column;gap:3px;animation:pop .32s cubic-bezier(.34,1.56,.64,1)}
.bw.L{align-items:flex-start}
.bw.R{align-items:flex-end}
@keyframes pop{
  from{opacity:0;transform:scale(.8) translateY(14px)}
  to  {opacity:1;transform:scale(1)  translateY(0)}
}
.bbl{
  max-width:90%;
  padding:13px 17px;
  font-size:16px;line-height:1.55;
  word-break:break-word;
  border-radius:var(--r);
}
.bbl.B{background:var(--card);border-top-left-radius:4px;box-shadow:0 1px 4px rgba(0,0,0,.1)}
.bbl.U{background:var(--wl);border-top-right-radius:4px;box-shadow:0 1px 4px rgba(0,0,0,.1)}
.btm{font-size:11px;color:var(--mute);padding:0 5px}
.bbl b,.bbl strong{color:var(--wd)}

/* greeting */
.greet{
  background:linear-gradient(135deg,#0d6b5e,#1cb89e);
  border-radius:16px;padding:18px 16px;margin-bottom:12px;
  display:flex;align-items:center;gap:14px;
}
.g-ic{font-size:38px;flex-shrink:0}
.g-tl{font-size:19px;font-weight:800;color:#fff}
.g-sb{font-size:13px;color:rgba(255,255,255,.82);margin-top:3px}

/* typing */
.typing{
  display:flex;align-items:center;gap:6px;
  padding:13px 17px;background:var(--card);
  border-radius:var(--r);border-top-left-radius:4px;
  width:fit-content;box-shadow:0 1px 4px rgba(0,0,0,.1);
}
.typing span{
  width:9px;height:9px;background:var(--mute);
  border-radius:50%;animation:dot 1.2s infinite;
}
.typing span:nth-child(2){animation-delay:.2s}
.typing span:nth-child(3){animation-delay:.4s}
@keyframes dot{
  0%,60%,100%{transform:translateY(0);opacity:.6}
  30%         {transform:translateY(-7px);opacity:1}
}

/* ════════════════ OPTIONS ════════════════ */
.opts{
  display:flex;flex-direction:column;gap:9px;
  padding:4px 13px 0;
  animation:pop .35s cubic-bezier(.34,1.56,.64,1);
}
.opt{
  min-height:var(--tap);
  background:var(--card);border:2px solid var(--bdr);
  border-radius:24px;padding:13px 20px;
  font-family:var(--font);font-size:16px;font-weight:700;
  color:var(--wd);cursor:pointer;text-align:left;
  transition:all .15s;display:flex;align-items:center;gap:13px;
  box-shadow:0 1px 5px rgba(0,0,0,.07);
  -webkit-user-select:none;user-select:none;
}
.opt:active{transform:scale(.97);background:#f0fdf4;border-color:var(--wa)}
.opt:hover{border-color:var(--wa);background:#f5fffc}
.oi{font-size:24px;flex-shrink:0}

/* group label */
.glbl{
  font-size:12px;font-weight:800;color:var(--wd);
  text-transform:uppercase;letter-spacing:1.2px;
  padding:12px 13px 4px;display:flex;align-items:center;gap:6px;
}

/* ════════════════ RATING ════════════════ */
.rwrap{
  display:flex;gap:8px;padding:4px 13px 0;
  animation:pop .35s cubic-bezier(.34,1.56,.64,1);
}
.rbtn{
  flex:1;min-height:80px;padding:10px 4px;
  border-radius:18px;border:2.5px solid var(--bdr);
  background:var(--card);font-size:28px;
  cursor:pointer;text-align:center;
  transition:all .15s;
  box-shadow:0 1px 5px rgba(0,0,0,.07);
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;gap:4px;
  font-family:var(--font);
  -webkit-user-select:none;user-select:none;
}
.rlbl{font-size:10px;font-weight:700;color:var(--mute);line-height:1.2;display:block}
.rbtn:active{transform:scale(.9)}
.rbtn.r1{border-color:#e74c3c}.rbtn.r2{border-color:#e67e22}
.rbtn.r3{border-color:#f39c12}.rbtn.r4{border-color:#27ae60}
.rbtn.r5{border-color:#25D366}
.rbtn.r1:active{background:#fff0f0}.rbtn.r5:active{background:#f0fdf4}

/* ════════════════ ISSUES ════════════════ */
.iwrap{
  display:flex;flex-wrap:wrap;gap:9px;
  padding:4px 13px 0;
  animation:pop .35s cubic-bezier(.34,1.56,.64,1);
}
.ichip{
  min-height:46px;padding:11px 18px;
  border-radius:24px;border:2px solid var(--bdr);
  background:var(--card);
  font-family:var(--font);font-size:15px;font-weight:600;
  color:var(--txt);cursor:pointer;
  transition:all .15s;
  -webkit-user-select:none;user-select:none;
}
.ichip.on{background:#fff0f0;border-color:var(--red);color:var(--red)}
.ichip:active{transform:scale(.95)}

.cbtn{
  margin:10px 13px 0;width:calc(100% - 26px);
  min-height:var(--tap);padding:15px;
  background:var(--wa);color:#fff;
  border:none;border-radius:24px;
  font-family:var(--font);font-size:17px;font-weight:700;
  cursor:pointer;transition:all .2s;
  box-shadow:0 3px 14px rgba(37,211,102,.38);
  animation:pop .4s cubic-bezier(.34,1.56,.64,1);
  -webkit-user-select:none;user-select:none;
}
.cbtn:active{transform:scale(.97);background:var(--wd)}

/* ════════════════ INPUT ════════════════ */
.inwrap{
  padding:8px 13px 0;display:flex;gap:10px;
  animation:pop .35s cubic-bezier(.34,1.56,.64,1);
}
.infld{
  flex:1;min-height:var(--tap);
  padding:14px 20px;border-radius:28px;
  border:2px solid var(--bdr);
  font-family:var(--font);font-size:16px;
  outline:none;background:var(--card);color:var(--txt);
  transition:border-color .2s;
  box-shadow:0 1px 5px rgba(0,0,0,.07);
}
.infld:focus{border-color:var(--wa)}
.insnd{
  width:60px;height:60px;border-radius:50%;
  background:var(--wa);border:none;color:#fff;
  font-size:24px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  flex-shrink:0;
  box-shadow:0 3px 14px rgba(37,211,102,.42);
  transition:all .15s;
  -webkit-user-select:none;user-select:none;
}
.insnd:active{transform:scale(.88);background:var(--wd)}

/* ════════════════ SUMMARY ════════════════ */
.scard{
  background:var(--card);border-radius:22px;
  margin:6px 13px 0;overflow:hidden;
  box-shadow:0 3px 18px rgba(0,0,0,.1);
  animation:pop .42s cubic-bezier(.34,1.56,.64,1);
}
.shdr{
  background:var(--wd);padding:15px 20px;
  color:#fff;font-size:16px;font-weight:800;
}
.srow{
  padding:13px 20px;display:flex;
  justify-content:space-between;align-items:center;
  border-bottom:1px solid var(--bdr);font-size:15px;gap:10px;
}
.srow:last-child{border-bottom:none}
.sk{color:var(--mute);font-weight:500;flex-shrink:0}
.sv{font-weight:700;text-align:right}
.sbdg{
  padding:5px 14px;border-radius:20px;
  font-size:13px;font-weight:700;white-space:nowrap;
}
.sg{background:#b7e1cd;color:#0a5c36}
.sm{background:#fcedb5;color:#7d4b00}
.sb2{background:#f4cccc;color:#7d1313}

/* ════════════════ ACTION BTNS ════════════════ */
.abtns{
  padding:10px 13px 0;
  display:flex;flex-direction:column;gap:10px;
  animation:pop .52s cubic-bezier(.34,1.56,.64,1);
}
.bwa,.bsh,.brs{
  min-height:62px;border:none;border-radius:24px;
  font-family:var(--font);font-size:17px;font-weight:700;
  cursor:pointer;display:flex;align-items:center;
  justify-content:center;gap:13px;
  transition:all .2s;
  -webkit-user-select:none;user-select:none;
}
.bwa{background:var(--wa);color:#fff;box-shadow:0 4px 18px rgba(37,211,102,.42)}
.bwa:active{transform:scale(.97);background:var(--wd)}
.bsh{background:var(--blue);color:#fff;box-shadow:0 4px 18px rgba(26,115,232,.36)}
.bsh:active{transform:scale(.97);background:#1557b0}
.bsh.loading{background:#aaa;pointer-events:none}
.bsh.saved{background:#2d6a4f;pointer-events:none}
.bsh.serr{background:var(--red)}
.brs{background:transparent;color:var(--mute);border:2px solid var(--bdr)}
.brs:active{background:var(--bdr)}
.bic{font-size:26px}

/* ════════════════ TOAST ════════════════ */
#toast{
  position:fixed;bottom:26px;left:50%;
  transform:translateX(-50%) translateY(120px);
  background:#1a1a2e;color:#fff;
  padding:14px 26px;border-radius:32px;
  font-size:15px;font-weight:600;
  z-index:999;transition:transform .32s cubic-bezier(.34,1.56,.64,1);
  white-space:nowrap;box-shadow:0 4px 22px rgba(0,0,0,.3);
  pointer-events:none;
}
#toast.show{transform:translateX(-50%) translateY(0)}

.btm-space{height:36px}
</style>
</head>
<body>

<!-- HEADER -->
<div id="hdr">
  <div id="hdr-av">🏢</div>
  <div id="hdr-info">
    <h1>Floor Inspection Bot</h1>
    <p id="hdr-st">Online</p>
  </div>
  <div id="hdr-step">1 / 7</div>
</div>

<!-- PROGRESS BAR -->
<div id="prog-wrap">
  <div id="prog-track"><div id="prog-fill"></div></div>
  <div id="prog-txt">Shuru karo...</div>
</div>

<!-- CHAT AREA -->
<div id="chat"></div>
<div class="btm-space"></div>

<!-- TOAST -->
<div id="toast"></div>

<script>
/* ══════════════════════════════════════════════
   ⚙️  CONFIG — SIRF YAHAN 2 CHEEZEIN BADLO
══════════════════════════════════════════════ */
const MANAGER_PHONE = '918938001404';       // e.g. 919876543210
const SHEET_URL     = 'https://script.google.com/macros/s/AKfycbxbQ2T-YMLxiIdgyO0petgXhaof5yyI8nLRhoZd4do_9Fh7YOXkuwouj81x-cXz2P6A/exec';  // Apps Script deploy URL
/* ══════════════════════════════════════════ */

// ── DOM refs ──────────────────────────────
const chat   = document.getElementById('chat');
const pFill  = document.getElementById('prog-fill');
const pTxt   = document.getElementById('prog-txt');
const hStep  = document.getElementById('hdr-step');
const hSt    = document.getElementById('hdr-st');
const STEPS  = 7;

// ── State ─────────────────────────────────
let S    = {sup:'',floor:'',shift:'',ratings:{},issues:[],note:''};
let rIdx = 0;
let ssel = [];

// ── Static Data ───────────────────────────
const GROUPS = [
  { g:'🏗️ Main Building', f:[{ic:'🔝',lb:'11th Floor'}] },
  { g:'🅰️ A Block', f:[
    {ic:'🔟',lb:'10th Floor — A Block'},
    {ic:'2️⃣',lb:'2nd Floor — A Block'},
    {ic:'1️⃣',lb:'1st Floor — A Block'},
  ]},
  { g:'🅱️ B Block', f:[{ic:'🔟',lb:'10th Floor — B Block'}] },
  { g:'🇨 C Block', f:[
    {ic:'🏠',lb:'Ground Floor — C Block'},
    {ic:'1️⃣',lb:'1st Floor — C Block'},
    {ic:'2️⃣',lb:'2nd Floor — C Block'},
  ]},
  { g:'🇩 D Block', f:[{ic:'1️⃣',lb:'1st Floor — D Block'}] },
  { g:'🏢 Other',   f:[{ic:'6️⃣',lb:'6th Floor'}] },
];

const AREAS = [
  {k:'washroom',l:'Washroom',           ic:'🚿'},
  {k:'floor',   l:'Floor / Passage',    ic:'🧹'},
  {k:'dustbin', l:'Dustbins',           ic:'🗑️'},
  {k:'kitchen', l:'Kitchen/Cafeteria',  ic:'🍽️'},
  {k:'cabin',   l:'Cabins / Desks',     ic:'💼'},
  {k:'meeting', l:'Meeting Room',       ic:'📊'},
];

const RATES = [
  {r:1,e:'😡',l:'Bahut\nKharab'},
  {r:2,e:'😞',l:'Kharab'},
  {r:3,e:'😐',l:'Theek\nHai'},
  {r:4,e:'😊',l:'Accha'},
  {r:5,e:'🤩',l:'Perfect!'},
];

const ISSUES = [
  {k:'smell',         l:'👃 Bad Smell'},
  {k:'dirty_wc',      l:'🚿 Dirty Washroom'},
  {k:'bin_full',      l:'🗑️ Dustbin Full'},
  {k:'not_mopped',    l:'🧹 Floor Mop Nahi'},
  {k:'spill',         l:'💧 Spill Hai'},
  {k:'meeting_reset', l:'📊 Meeting Room Reset Nahi'},
  {k:'kitchen_dirty', l:'🍽️ Kitchen Messy'},
  {k:'no_tissue',     l:'🧻 Tissue Khatam'},
  {k:'ac_dust',       l:'❄️ AC Dirty'},
  {k:'staff_absent',  l:'🚫 Staff Absent'},
  {k:'other',         l:'⚠️ Kuch Aur'},
];

// ── Utils ─────────────────────────────────
const T  = () => new Date().toLocaleTimeString('en-IN',{hour:'2-digit',minute:'2-digit'});
const D  = () => new Date().toLocaleDateString('en-IN');
const DL = () => new Date().toLocaleDateString('en-IN',{weekday:'long',day:'numeric',month:'long',year:'numeric'});

function setP(step){
  const pct=Math.round(step/STEPS*100);
  pFill.style.width=pct+'%';
  pTxt.textContent=`Step ${step} / ${STEPS}  —  ${pct}% complete`;
  hStep.textContent=`${step} / ${STEPS}`;
}

function avgSc(){
  const v=Object.values(S.ratings);
  return v.length?Math.round(v.reduce((a,b)=>a+b,0)/v.length*10)/10:0;
}

function scCl(s){return s>=4?'sg':s>=3?'sm':'sb2'}
function scLb(s){
  if(s>=4.5)return'🤩 Excellent';
  if(s>=4)  return'😊 Good';
  if(s>=3)  return'😐 Average';
  if(s>=2)  return'😞 Poor';
  return'😡 Critical';
}

function scroll(){setTimeout(()=>window.scrollTo({top:document.body.scrollHeight,behavior:'smooth'}),60)}

function greet(){
  const h=new Date().getHours();
  if(h>=5&&h<12) return{t:'Good Morning!',  e:'🌅',s:'Aaj ka din accha jaaye!'};
  if(h>=12&&h<17)return{t:'Good Afternoon!',e:'☀️',s:'Dopahar ki inspection!'};
  if(h>=17&&h<21)return{t:'Good Evening!',  e:'🌆',s:'Shaam ki round!'};
  return              {t:'Good Night!',     e:'🌙',s:'Late shift — shukriya!'};
}

function toast(msg,col='#1a1a2e'){
  const el=document.getElementById('toast');
  el.textContent=msg;el.style.background=col;
  el.classList.add('show');
  setTimeout(()=>el.classList.remove('show'),3000);
}

// ── DOM Builders ──────────────────────────
function dateDivider(){
  const d=document.createElement('div');
  d.className='ddiv';
  d.innerHTML=`<span>${DL()}</span>`;
  chat.appendChild(d);
}

function botMsg(html,delay=0){
  return new Promise(res=>{
    const tw=document.createElement('div');
    tw.className='bw L';
    tw.innerHTML=`<div class="typing"><span></span><span></span><span></span></div>`;
    chat.appendChild(tw);scroll();
    setTimeout(()=>{
      tw.remove();
      const w=document.createElement('div');
      w.className='bw L';
      w.innerHTML=`<div class="bbl B">${html}</div><div class="btm">${T()}</div>`;
      chat.appendChild(w);scroll();res();
    },delay+680);
  });
}

function usrMsg(txt){
  const w=document.createElement('div');
  w.className='bw R';
  w.innerHTML=`<div class="bbl U">${txt}</div><div class="btm">${T()} ✓✓</div>`;
  chat.appendChild(w);scroll();
}

function showOpts(list,onSel){
  const wrap=document.createElement('div');
  wrap.className='opts';
  list.forEach(o=>{
    const b=document.createElement('button');
    b.className='opt';
    b.innerHTML=`<span class="oi">${o.ic}</span><span>${o.lb}</span>`;
    b.onclick=()=>{wrap.remove();onSel(o)};
    wrap.appendChild(b);
  });
  chat.appendChild(wrap);scroll();
}

function showFloors(onSel){
  const all=[];
  GROUPS.forEach(g=>{
    const lbl=document.createElement('div');
    lbl.className='glbl';
    lbl.textContent=g.g;
    chat.appendChild(lbl);all.push(lbl);
    const wrap=document.createElement('div');
    wrap.className='opts';wrap.style.paddingTop='2px';
    g.f.forEach(f=>{
      const b=document.createElement('button');
      b.className='opt';
      b.innerHTML=`<span class="oi">${f.ic}</span><span>${f.lb}</span>`;
      b.onclick=()=>{
        all.forEach(e=>e.remove());
        document.querySelectorAll('.opts').forEach(e=>e.remove());
        onSel(f);
      };
      wrap.appendChild(b);
    });
    chat.appendChild(wrap);all.push(wrap);
  });
  scroll();
}

function showRating(onRate){
  const wrap=document.createElement('div');
  wrap.className='rwrap';
  RATES.forEach(r=>{
    const b=document.createElement('button');
    b.className=`rbtn r${r.r}`;
    b.innerHTML=`${r.e}<span class="rlbl">${r.l}</span>`;
    b.onclick=()=>{wrap.remove();onRate(r)};
    wrap.appendChild(b);
  });
  chat.appendChild(wrap);scroll();
}

function showIssues(onDone){
  ssel=[];
  const wrap=document.createElement('div');wrap.className='iwrap';
  const cBtn=document.createElement('button');
  cBtn.className='cbtn';
  cBtn.textContent='✅ Koi Issue Nahi — Sab Theek';
  ISSUES.forEach(iss=>{
    const b=document.createElement('button');b.className='ichip';
    b.textContent=iss.l;
    b.onclick=()=>{
      b.classList.toggle('on');
      if(ssel.includes(iss.k))ssel=ssel.filter(x=>x!==iss.k);
      else ssel.push(iss.k);
      cBtn.textContent=ssel.length===0
        ?'✅ Koi Issue Nahi — Sab Theek'
        :`✅ ${ssel.length} Issue Select — Aage Badho`;
    };
    wrap.appendChild(b);
  });
  cBtn.onclick=()=>{wrap.remove();cBtn.remove();onDone(ssel)};
  chat.appendChild(wrap);chat.appendChild(cBtn);scroll();
}

function showInput(ph,onSend){
  const wrap=document.createElement('div');wrap.className='inwrap';
  const inp=document.createElement('input');
  inp.className='infld';inp.placeholder=ph;
  inp.setAttribute('autocomplete','off');inp.setAttribute('autocorrect','off');
  const btn=document.createElement('button');btn.className='insnd';btn.textContent='➤';
  const go=()=>{
    const v=inp.value.trim();if(!v)return;
    wrap.remove();onSend(v);
  };
  btn.onclick=go;inp.onkeydown=e=>{if(e.key==='Enter')go()};
  wrap.appendChild(inp);wrap.appendChild(btn);
  chat.appendChild(wrap);
  setTimeout(()=>{inp.focus();scroll()},350);
}

// ── FLOW ──────────────────────────────────
async function s0(){
  setP(1);dateDivider();
  const g=greet();
  await botMsg(`
    <div class="greet">
      <div class="g-ic">${g.e}</div>
      <div>
        <div class="g-tl">${g.t}</div>
        <div class="g-sb">${g.s}</div>
      </div>
    </div>
    Main aapka <b>Floor Inspection Assistant</b> hoon.<br>
    Sirf <b>2 minute</b> mein poori report + Google Sheet save! ⚡
  `,0);
  await botMsg(`Pehle batao — <b>aap kaun hain?</b> 👤`,300);
  showInput('Apna naam likho...',name=>{
    S.sup=name;usrMsg(`👤 ${name}`);s1();
  });
}

async function s1(){
  setP(2);
  await botMsg(`<b>${S.sup} Ji!</b> 🙏<br><br>Kaun si <b>shift</b> hai abhi?`,200);
  showOpts([
    {ic:'🌅',lb:'Morning — 9:00 AM'},
    {ic:'☀️',lb:'Dopahar — 1:00 PM'},
    {ic:'🌆',lb:'Shaam — 5:00 PM'},
  ],o=>{S.shift=o.lb;usrMsg(`${o.ic} ${o.lb}`);s2()});
}

async function s2(){
  setP(3);
  await botMsg(`Theek hai! <b>Konsa floor / block</b> inspect kar rahe ho? 🏢`,200);
  showFloors(f=>{S.floor=f.lb;usrMsg(`${f.ic} ${f.lb}`);s3()});
}

async function s3(){
  setP(4);
  await botMsg(
    `<b>${S.floor}</b> — bilkul! 👍<br><br>`+
    `Ab har area ko rate karo:<br>`+
    `😡 Bahut Kharab &nbsp;›&nbsp; 😞 &nbsp;›&nbsp; 😐 &nbsp;›&nbsp; 😊 &nbsp;›&nbsp; 🤩 Perfect`,
    200
  );
  rIdx=0;nextRate();
}

async function nextRate(){
  if(rIdx>=AREAS.length){s4();return}
  const a=AREAS[rIdx];
  await botMsg(`${a.ic} <b>${a.l}</b> kaisa hai?`,150);
  showRating(r=>{
    S.ratings[a.k]=r.r;
    usrMsg(`${r.e} ${r.l.replace('\n',' ')} — ${a.l}`);
    rIdx++;nextRate();
  });
}

async function s4(){
  setP(5);
  const sc=avgSc();
  await botMsg(sc>=4
    ?`Score <b>${sc}/5</b> ${scLb(sc)} 🎉<br><br>Koi <b>specific issue</b> bhi hai?`
    :`Score <b>${sc}/5</b> ${scLb(sc)} ⚠️<br><br>Koi <b>issue</b> ho toh select karo:`,
    300
  );
  showIssues(iss=>{
    S.issues=iss;
    usrMsg(iss.length===0?'✅ Koi issue nahi'
      :'⚠️ '+iss.map(k=>ISSUES.find(i=>i.k===k)?.l).join(', '));
    s5();
  });
}

async function s5(){
  setP(6);
  await botMsg(`Koi <b>extra note</b>? 📝<br><span style="color:var(--mute);font-size:14px">Koi bhi zaruri baat — ya "sab theek" likho</span>`,300);
  showInput('Note ya "sab theek" likho...',note=>{
    S.note=note;usrMsg(`📝 ${note}`);s6();
  });
}

async function s6(){
  setP(7);hSt.textContent='Inspection Done ✅';
  const sc=avgSc();
  await botMsg(`<b>Inspection complete!</b> ✅ Summary:`,300);

  // Summary card
  const issH=S.issues.length>0
    ?S.issues.map(k=>ISSUES.find(i=>i.k===k)?.l).join('<br>')
    :'✅ Koi issue nahi';

  const card=document.createElement('div');
  card.className='scard';
  card.innerHTML=`
    <div class="shdr">📋 Inspection Report — ${D()}</div>
    <div class="srow"><span class="sk">👤 Supervisor</span><span class="sv">${S.sup}</span></div>
    <div class="srow"><span class="sk">🏢 Floor/Block</span><span class="sv">${S.floor}</span></div>
    <div class="srow"><span class="sk">⏰ Shift</span><span class="sv">${S.shift}</span></div>
    <div class="srow">
      <span class="sk">⭐ Overall</span>
      <span class="sv"><span class="sbdg ${scCl(sc)}">${sc}/5 — ${scLb(sc)}</span></span>
    </div>
    ${AREAS.map(a=>`
    <div class="srow">
      <span class="sk">${a.ic} ${a.l}</span>
      <span class="sv"><span class="sbdg ${scCl(S.ratings[a.k])}">${RATES.find(r=>r.r===S.ratings[a.k])?.e} ${S.ratings[a.k]}/5</span></span>
    </div>`).join('')}
    <div class="srow"><span class="sk">⚠️ Issues</span><span class="sv" style="color:var(--red);font-size:14px;text-align:right">${issH}</span></div>
    <div class="srow"><span class="sk">📝 Note</span><span class="sv" style="font-size:14px">${S.note}</span></div>
  `;
  chat.appendChild(card);scroll();

  // Auto-save to sheet silently
  autoSave();

  setTimeout(()=>{
    const ab=document.createElement('div');ab.className='abtns';

    const wa=document.createElement('button');wa.className='bwa';
    wa.innerHTML=`<span class="bic">📲</span> WhatsApp pe Bhejo`;
    wa.onclick=sendWA;ab.appendChild(wa);

    const sh=document.createElement('button');sh.className='bsh';
    sh.id='sh-btn';
    sh.innerHTML=`<span class="bic">📊</span> Google Sheet Mein Save Karo`;
    sh.onclick=()=>saveSheet(sh);ab.appendChild(sh);

    const rb=document.createElement('button');rb.className='brs';
    rb.textContent='🔄 Naya Inspection Shuru Karo';
    rb.onclick=restart;ab.appendChild(rb);

    chat.appendChild(ab);scroll();
  },1100);
}

// ── AUTO SAVE (silent background) ────────
async function autoSave(){
  if(SHEET_URL==='PASTE_SCRIPT_URL') return;
  try {
    await fetch(SHEET_URL,{
      method:'POST',mode:'no-cors',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify(buildPayload())
    });
    toast('✅ Sheet mein auto-save ho gaya!','#2d6a4f');
    const shBtn=document.getElementById('sh-btn');
    if(shBtn){
      shBtn.classList.add('saved');
      shBtn.innerHTML=`<span class="bic">✅</span> Pehle se Sheet Mein Save Hai`;
    }
  } catch(e){ /* silent fail, user can retry manually */ }
}

// ── MANUAL SHEET SAVE ─────────────────────
async function saveSheet(btn){
  if(SHEET_URL==='PASTE_SCRIPT_URL'){
    toast('⚠️ Apps Script URL add karo!','#e74c3c');
    await botMsg(`⚠️ <b>SHEET_URL</b> abhi placeholder hai.<br>File mein apna URL paste karo.`,0);
    return;
  }
  btn.classList.add('loading');
  btn.innerHTML=`<span class="bic">⏳</span> Save ho raha hai...`;
  try {
    await fetch(SHEET_URL,{
      method:'POST',mode:'no-cors',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify(buildPayload())
    });
    btn.classList.remove('loading');btn.classList.add('saved');
    btn.innerHTML=`<span class="bic">✅</span> Sheet Mein Save Ho Gaya!`;
    toast('✅ Data Google Sheet mein save!','#2d6a4f');
  } catch(err){
    btn.classList.remove('loading');btn.classList.add('serr');
    btn.innerHTML=`<span class="bic">❌</span> Error — Dobara Try Karo`;
    btn.onclick=()=>saveSheet(btn);
    toast('❌ Save nahi hua — retry karo','#e74c3c');
  }
}

function buildPayload(){
  const sc=avgSc();
  return {
    date:S.sup?D():'',time:T(),
    supervisor:S.sup,floor:S.floor,shift:S.shift,
    washroom: S.ratings['washroom'] ||0,
    floorArea:S.ratings['floor']    ||0,
    dustbin:  S.ratings['dustbin']  ||0,
    kitchen:  S.ratings['kitchen']  ||0,
    cabin:    S.ratings['cabin']    ||0,
    meeting:  S.ratings['meeting']  ||0,
    overall:  sc,
    issues:   S.issues.length>0
              ?S.issues.map(k=>ISSUES.find(i=>i.k===k)?.l).join(', ')
              :'Koi issue nahi',
    note:     S.note
  };
}

// ── WHATSAPP ──────────────────────────────
function sendWA(){
  const sc=avgSc(),g=greet();
  const iss=S.issues.length>0
    ?S.issues.map(k=>ISSUES.find(i=>i.k===k)?.l).join(', ')
    :'Koi issue nahi';
  const lines=AREAS.map(a=>
    `  ${a.ic} ${a.l}: ${RATES.find(r=>r.r===S.ratings[a.k])?.e} ${S.ratings[a.k]}/5`
  ).join('\n');
  const flag=sc>=4?'🟢':sc>=3?'🟡':'🔴';
  const msg=
`${g.e} *${g.t}*

🏢 *FLOOR INSPECTION REPORT*
📅 ${D()} | ${S.shift}
━━━━━━━━━━━━━━━━━━━━
👤 Supervisor: *${S.sup}*
🏢 Floor/Block: *${S.floor}*

⭐ *AREA RATINGS:*
${lines}

${flag} *Overall: ${sc}/5 — ${scLb(sc)}*

⚠️ *Issues:*
${iss}

📝 *Note:* ${S.note}
━━━━━━━━━━━━━━━━━━━━
_Floor Inspection Bot_`;
  window.open(`https://wa.me/${MANAGER_PHONE}?text=${encodeURIComponent(msg)}`,'_blank');
  toast('📲 WhatsApp open ho raha hai...','#128C7E');
}

// ── RESTART ───────────────────────────────
function restart(){
  chat.innerHTML='';
  S={sup:'',floor:'',shift:'',ratings:{},issues:[],note:''};
  rIdx=0;ssel=[];
  hSt.textContent='Online';
  s0();
}

// ── START ─────────────────────────────────
s0();
</script>
